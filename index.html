<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <!-- Meta tags setup for a native mobile feel -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0B1121" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="AutoFinTech" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>AutoFinTech</title>
    <!-- Google Fonts for premium typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Hotmart Checkout Widget -->
    <link rel="stylesheet" type="text/css" href="https://static.hotmart.com/css/hotmart-fb.min.css" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script type="module">
      // Em desenvolvimento, o Service Worker atrapalha (cache agressivo).
      // Em produção, ele habilita o PWA/offline/install.
      if ('serviceWorker' in navigator) {
        const isProd = import.meta.env.PROD;

        window.addEventListener('load', async () => {
          try {
            if (!isProd) {
              const regs = await navigator.serviceWorker.getRegistrations();
              await Promise.all(regs.map(r => r.unregister()));
              return;
            }
            await navigator.serviceWorker.register('/sw.js');
          } catch (err) {
            console.log('SW setup error', err);
          }
        });
      }
    </script>
  </body>
</html>
